name: Build sing-box binaries

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "sing-box version to build (e.g. 1.12.0). Leave empty to auto-detect latest."
        required: false
        type: string

permissions:
  contents: write

env:
  REPO: SagerNet/sing-box
  TAGS: "with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_v2ray_api,with_tailscale,with_ccm,with_ocm,with_cloudflared,badlinkname,tfogo_checklinkname0"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved sing-box version: ${VERSION}"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          if [ -n "${{ inputs.version }}" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Clone sing-box source
        run: |
          git clone --depth 1 --branch "v${{ needs.resolve-version.outputs.version }}" \
            "https://github.com/${REPO}.git" sing-box

      - name: Install cross-strip tools
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: sing-box
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          go build -trimpath \
            -tags "${TAGS}" \
            -ldflags "-s -w -checklinkname=0 -X 'internal/godebug.defaultGODEBUG=multipathtcp=0' -X github.com/sagernet/sing-box/constant.Version=${VERSION}" \
            -o sing-box \
            ./cmd/sing-box

      - name: Strip binary
        working-directory: sing-box
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            aarch64-linux-gnu-strip sing-box
          else
            strip sing-box
          fi

      - name: Package tarball
        working-directory: sing-box
        run: |
          tar -czf "sing-box-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sing-box/sing-box-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release
          for dir in artifacts/*/; do
            file=$(find "$dir" -type f -name "*.tar.gz")
            cp "$file" release/
          done
          cd release
          sha256sum * > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"
          gh release create "${TAG}" release/* \
            --repo "${{ github.repository }}" \
            --title "sing-box ${TAG}" \
            --notes "sing-box v${VERSION} with \`with_v2ray_api\` enabled.

          Build tags:
          \`\`\`
          ${TAGS}
          \`\`\`

          Static binaries (CGO_ENABLED=0), no external dependencies required."
